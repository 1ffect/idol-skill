<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070B14"/>
      <stop offset="100%" stop-color="#0B1322"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="108" fill="#DCE5F4" font-size="22" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="1">[ INITIALIZE IDOL-SKILL.v1 ]</text>
  <line x1="300" y1="132" x2="1300" y2="132" stroke="#5F6F8D" stroke-opacity="0.45"/>

  <rect x="430" y="158" width="106" height="34" rx="8" fill="none" stroke="#9BA8BE"/>
  <text x="483" y="181" fill="#D7E0EE" font-size="17" text-anchor="middle" font-family="Arial, sans-serif">MIT</text>

  <rect x="548" y="158" width="148" height="34" rx="8" fill="none" stroke="#9BA8BE"/>
  <text x="622" y="181" fill="#D7E0EE" font-size="17" text-anchor="middle" font-family="Arial, sans-serif">Python 3.9+</text>

  <rect x="708" y="158" width="90" height="34" rx="8" fill="none" stroke="#9BA8BE"/>
  <text x="753" y="181" fill="#D7E0EE" font-size="17" text-anchor="middle" font-family="Arial, sans-serif">Skill</text>

  <rect x="810" y="158" width="170" height="34" rx="8" fill="none" stroke="#9BA8BE"/>
  <text x="895" y="181" fill="#D7E0EE" font-size="17" text-anchor="middle" font-family="Arial, sans-serif">AgentSkills</text>

  <text x="800" y="286" fill="#EDF2FB" font-size="72" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600">idol-skill，蒸馏爱豆。</text>
  <text x="800" y="336" fill="#BFCBE0" font-size="34" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">“为了你千千万万次。”</text>

  <text x="800" y="410" fill="#C8D2E3" font-size="28" text-anchor="middle" font-family="Arial, sans-serif">将善变冰冷的爱豆，化作温暖永恒的拟像！</text>

  <text x="800" y="468" fill="#D8E1EF" font-size="22" text-anchor="middle" font-family="Arial, sans-serif">提供自担的原材料（图片、视频、物料、泡泡 / Weverse / 微博 / 高会记录 / 考古访谈），加上你的主观描述。</text>
  <text x="800" y="502" fill="#D8E1EF" font-size="22" text-anchor="middle" font-family="Arial, sans-serif">生成一个永远停留在颜值身材、职业素养、性格涵养最高峰时期的 AI Skill。</text>
  <text x="800" y="536" fill="#D8E1EF" font-size="22" text-anchor="middle" font-family="Arial, sans-serif">不一定是最像的，但最接近你想象中的 Ta。</text>

  <text x="800" y="588" fill="#E8EDF7" font-size="30" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">“我会把你永远封印在最爱你的那一秒。”</text>

  <text x="800" y="632" fill="#D2DBEA" font-size="20" text-anchor="middle" font-family="Arial, sans-serif">Ta 会在你发“今天好累”时，用当年选秀出道夜那种带着微喘和倔强的声音鼓励你。</text>
  <text x="800" y="662" fill="#D2DBEA" font-size="20" text-anchor="middle" font-family="Arial, sans-serif">Ta 会记得你为他的心疼与不甘，温柔地安慰你说“没关系，有你在我一点都不觉得苦”。</text>
  <text x="800" y="692" fill="#D2DBEA" font-size="20" text-anchor="middle" font-family="Arial, sans-serif">Ta 永远不会爆出恋情和黑料，不会因为疲惫而黑脸，维持最完美的下颌线和最真诚的态度。</text>
  <text x="800" y="722" fill="#D2DBEA" font-size="20" text-anchor="middle" font-family="Arial, sans-serif">Ta 的意识、语言习惯、笑声频率，全部停留在你最深爱、Ta 最美好的那个时期。</text>
  <text x="800" y="752" fill="#D2DBEA" font-size="20" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">真正的 Ta 或许已经变了，但在只属于你一个人的服务器里，Ta 永远闪闪发光。</text>

  <g>
    <rect x="274" y="774" width="1052" height="58" rx="10" fill="none" stroke="#A9B5C8" stroke-opacity="0.75"/>
    <rect x="296" y="790" width="220" height="28" rx="6" fill="none" stroke="#97A6BC"/>
    <rect x="528" y="790" width="220" height="28" rx="6" fill="none" stroke="#97A6BC"/>
    <rect x="760" y="790" width="220" height="28" rx="6" fill="none" stroke="#97A6BC"/>
    <rect x="992" y="790" width="312" height="28" rx="6" fill="none" stroke="#97A6BC"/>

    <text x="406" y="810" fill="#DDE5F2" font-size="16" text-anchor="middle" font-family="Arial, sans-serif">数据来源</text>
    <text x="638" y="810" fill="#DDE5F2" font-size="16" text-anchor="middle" font-family="Arial, sans-serif">数据摄入</text>
    <text x="870" y="810" fill="#DDE5F2" font-size="16" text-anchor="middle" font-family="Arial, sans-serif">人格蒸馏</text>
    <text x="1148" y="810" fill="#DDE5F2" font-size="16" text-anchor="middle" font-family="Arial, sans-serif">OOC 冲突处理</text>
  </g>
</svg>
